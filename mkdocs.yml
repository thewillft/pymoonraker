site_name: pymoonraker
site_description: Async-first, fully typed Python SDK for the Moonraker API the networked interface for Klipper 3D printers
site_url: https://thewillft.github.io/pymoonraker/
repo_url: https://github.com/thewillft/pymoonraker
repo_name: thewillft/pymoonraker

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Usage:
      - Client Lifecycle: usage/client-lifecycle.md
      - Common Operations: usage/common-operations.md
      - Events: usage/events.md
      - Error Handling: usage/error-handling.md
  - API Reference:
      - Overview: api/index.md
      - Async Client: api/client.md
      - Sync Client: api/sync-client.md
      - Events: api/events.md
      - Namespaces:
          - Overview: api/namespaces/index.md
          - Printer: api/namespaces/printer.md
          - Server: api/namespaces/server.md
          - Files: api/namespaces/files.md
          - Job Queue: api/namespaces/job-queue.md
          - History: api/namespaces/history.md
          - Machine: api/namespaces/machine.md
          - Update Manager: api/namespaces/update-manager.md
          - Power: api/namespaces/power.md
          - Access: api/namespaces/access.md
          - Database: api/namespaces/database.md
          - Announcements: api/namespaces/announcements.md
          - Webcams: api/namespaces/webcams.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_root_heading: true
            show_root_toc_entry: true
            heading_level: 2
            inherited_members: true
            separate_signature: true
            show_signature_annotations: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            filters:
              - "!^_"
